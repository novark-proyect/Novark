<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excessive Piracy | EP Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Outfit', sans-serif; }
        .font-brand { font-family: 'Bebas Neue', sans-serif; }
        .game-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; }
        .view-section { display: none; padding-top: 80px; }
        .active { display: block; }
        header { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.9); border-bottom: 1px solid #00f2ff33; height: 70px; display: flex; align-items: center; padding: 0 20px; }
    </style>
</head>
<body>

    <header>
        <div onclick="navigate('home')" class="cursor-pointer">
            <span class="font-brand text-2xl text-white">EXCESSIVE <span class="text-cyan-400">PIRACY</span></span>
        </div>
    </header>

    <main id="home-view" class="view-section active px-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="gameGrid"></div>
    </main>

    <section id="detail-view" class="view-section px-6">
        <button onclick="navigate('home')" class="text-cyan-400 mb-6 font-bold">← VOLVER</button>
        
        <div class="max-w-xl mx-auto">
            <img id="dImg" class="w-full rounded-2xl mb-4 shadow-lg shadow-cyan-500/20">
            <h2 id="dTitle" class="text-4xl font-brand text-cyan-400"></h2>
            <p id="dDesc" class="text-gray-400 mt-2 mb-6"></p>
            <div id="dLink"></div>

            <hr class="border-gray-800 my-10">

            <div class="bg-zinc-900 p-6 rounded-2xl">
                <h3 class="text-xl font-bold mb-4">Escribir Reseña</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-gray-500">Correo electrónico:</label>
                        <input type="email" id="revEmail" class="w-full bg-black border border-zinc-700 p-2 rounded text-sm outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Usuario:</label>
                        <input type="text" id="revUser" class="w-full bg-black border border-zinc-700 p-2 rounded text-sm outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Reseña:</label>
                        <textarea id="revText" class="w-full bg-black border border-zinc-700 p-2 rounded text-sm h-24 outline-none focus:border-cyan-500"></textarea>
                    </div>
                    <button onclick="saveReview()" class="w-full bg-white text-black font-bold py-2 rounded-lg hover:bg-cyan-400 transition">PUBLICAR</button>
                </div>

                <div id="reviewsList" class="mt-8 space-y-4">
                    </div>
            </div>
        </div>
    </section>

    <script>
        const games = [
            { id: 'rdr', title: 'Red Dead Redemption', poster: 'https://upload.wikimedia.org/wikipedia/en/a/a7/Red_Dead_Redemption.jpg', desc: 'Acción épica en el viejo oeste.', link: '#' },
            { id: 'gtasa', title: 'GTA San Andreas', poster: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0HDsIEYbbjaj7Ga-y6R7ubG_XRz4wC2DI9g&s', desc: 'Vuelve a las calles de Los Santos.', link: '#' },
            { id: 'pvz', title: 'PvZ Fusion', poster: 'https://thepvzfusion.pro/wp-content/uploads/2026/02/images-12-1.webp', desc: 'Nuevas fusiones de plantas y zombies.', link: '#' }
        ];

        let currentGameId = '';

        function render() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = games.map(g => `
                <div class="game-card" onclick="openGame('${g.id}')">
                    <img src="${g.poster}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-2 text-center text-xs font-bold">${g.title}</div>
                </div>
            `).join('');
        }

        function openGame(id) {
            const g = games.find(x => x.id === id);
            currentGameId = id;
            document.getElementById('dImg').src = g.poster;
            document.getElementById('dTitle').innerText = g.title;
            document.getElementById('dDesc').innerText = g.desc;
            document.getElementById('dLink').innerHTML = `<a href="${g.link}" class="bg-cyan-400 text-black p-4 rounded-xl font-bold block text-center">DESCARGAR APK</a>`;
            
            loadReviews();
            navigate('detail');
        }

        function navigate(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            window.scrollTo(0,0);
        }

        // LÓGICA DE RESEÑAS (LocalStorage)
        function saveReview() {
            const email = document.getElementById('revEmail').value;
            const user = document.getElementById('revUser').value;
            const text = document.getElementById('revText').value;

            if(!user || !text) return alert("Por favor llena los campos");

            const review = { email, user, text, date: new Date().toLocaleDateString() };
            
            // Guardar en la "memoria" del navegador
            let allReviews = JSON.parse(localStorage.getItem('ep_reviews_' + currentGameId)) || [];
            allReviews.unshift(review); // Poner la más reciente arriba
            localStorage.setItem('ep_reviews_' + currentGameId, JSON.stringify(allReviews));

            // Limpiar y recargar
            document.getElementById('revText').value = "";
            loadReviews();
        }

        function loadReviews() {
            const list = document.getElementById('reviewsList');
            const reviews = JSON.parse(localStorage.getItem('ep_reviews_' + currentGameId)) || [];
            
            if(reviews.length === 0) {
                list.innerHTML = `<p class="text-gray-600 text-center text-sm">No hay reseñas aún. ¡Sé el primero!</p>`;
                return;
            }

            list.innerHTML = reviews.map(r => `
                <div class="border-l-2 border-cyan-500 bg-black/40 p-4 rounded-r-lg">
                    <div class="flex justify-between text-[10px] mb-1 text-cyan-400 uppercase font-bold">
                        <span>${r.user}</span>
                        <span class="text-gray-600">${r.date}</span>
                    </div>
                    <p class="text-sm text-gray-300">${r.text}</p>
                    <p class="text-[9px] text-gray-700 mt-2 italic">${r.email}</p>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
