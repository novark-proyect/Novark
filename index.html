        function init() {
            const grid = document.getElementById('langGrid');
            grid.innerHTML = Object.keys(flags).map(code => `<button onclick="setLang('${code}')" class="lang-btn">${flags[code]}</button>`).join('');
            AOS.init();
        }

        function setLang(code) {
            curLang = code;
            document.getElementById('language-overlay').style.display = 'none';
            render();
            setTimeout(() => { document.getElementById('mainBanner').classList.add('active-banner'); }, 300);
        }

        function render() {
            const s = document.getElementById('catalogSearch').value.toLowerCase();
            const grid = document.getElementById('gameGrid');
            const filt = games.filter(g => g.title.toLowerCase().includes(s));
            grid.innerHTML = filt.map((g, i) => `
                <div class="game-card" data-aos="fade-up" onclick="startLoading('${g.id}')">
                    <img src="${g.poster}" class="char-img">
                    <div class="game-title-badge">
                        <span class="verified-tag">Verificado Por Ep team</span>
                        <span class="game-title-text">${g.title}</span>
                    </div>
                </div>
            `).join('');
        }

        function startLoading(gameId) {
            const loader = document.getElementById('loading-screen');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                if(gameId === 'home') showView('home');
                else if(gameId === 'request') showView('request');
                else openGame(gameId);
            }, 100);
        }

        function openGame(id) {
            const g = games.find(x => x.id === id);
            document.getElementById('detailImg').src = g.screen;
            document.getElementById('detailTitle').innerText = g.title;
            document.getElementById('detailDesc').innerText = g.desc;
            
            let reqsHTML = '';
            if(g.reqs) {
                reqsHTML = `
                    <div class="req-box">
                        <div class="req-title uppercase tracking-[2px]">REQUISITOS DE SISTEMA</div>
                        ${g.reqs.map(r => `<span class="req-item">• ${r}</span>`).join('')}
                        <p class="req-warning">Datos aproximados, No está garantizado estos requisitos</p>
                    </div>
                `;
            }
            document.getElementById('requirementsContainer').innerHTML = reqsHTML;

            // Atributo download añadido para intentar forzar la descarga directa
            document.getElementById('downloadContainer').innerHTML = `
                <a href="${g.link}" download="${g.title}.apk" class="download-btn">
                    DESCARGAR APK
                </a>`;
            showView('detail');
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            window.scrollTo(0,0);
        }

        function navigate(viewName) {
            startLoading(viewName);
        }

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-menu-overlay');
            menu.classList.toggle('open');
            overlay.style.display = menu.classList.contains('open') ? 'block' : 'none';
        }

        async function sendRequest() {
            const val = document.getElementById('requestInput').value;
            if(!val) return;
            await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: `SOLICITUD: **${val}**`}) });
            document.getElementById('requestInput').value = "";
            document.getElementById('req-btn').innerText = "ENVIADO ✓";
        }

        init();
    </script>
