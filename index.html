<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excessive Piracy | EP Team Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Bebas+Neue&family=Outfit:wght@300;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root { --cyan: #00f2ff; --dark: #000000; --glow: rgba(0, 242, 255, 0.3); }
        body { background-color: var(--dark); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .font-brand { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        .font-ui { font-family: 'Rajdhani', sans-serif; }
        
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.1); height: 70px; display: flex; align-items: center; padding: 0 1rem; }
        
        .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 16px; border-radius: 12px; color: white; outline: none; font-size: 14px; }
        .search-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px var(--glow); }
        
        .game-card { background: #0a0a0a; border: 1px solid #1a1a1a; position: relative; overflow: hidden; border-radius: 18px; transition: 0.4s; cursor: pointer; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--cyan); }
        
        .char-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; transition: 0.6s ease; }
        .game-title-badge { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #000 40%, transparent); padding: 20px 10px 10px 10px; }
        .game-title-text { color: #fff; font-weight: 700; font-family: 'Space Grotesk'; text-transform: uppercase; font-size: 10px; border-left: 3px solid var(--cyan); padding-left: 8px; }

        .view-section { display: none; opacity: 0; transition: 0.4s; }
        .view-section.active { display: block; opacity: 1; }

        .download-btn { background: var(--cyan); color: #000; font-weight: 900; width: 100%; padding: 1rem; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; transition: 0.3s; }
        .download-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Estilo para los campos de reseña que pediste */
        .review-input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; font-size: 14px; outline: none; margin-bottom: 10px; }
        .review-input:focus { border-color: var(--cyan); }
        .review-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--cyan); }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
            <img src="https://i.ibb.co/G4Z5gvHw/icon.png" class="w-10 h-10 rounded-lg">
            <span class="font-brand text-xl text-white">EP <span class="text-cyan-400">TEAM</span></span>
        </div>
        <div class="flex-grow mx-4">
            <input type="text" id="catalogSearch" class="search-input" oninput="render()" placeholder="Buscar...">
        </div>
    </header>

    <div class="pt-24 pb-10">
        <main id="home-view" class="view-section active px-4 max-w-7xl mx-auto">
            <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </main>

        <section id="detail-view" class="view-section px-4">
            <div class="max-w-4xl mx-auto">
                <button onclick="navigate('home')" class="text-cyan-400 font-bold mb-6 block uppercase text-sm">← Volver al catálogo</button>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                    <img id="detailImg" class="w-full rounded-2xl shadow-2xl">
                    <div>
                        <h2 id="detailTitle" class="text-4xl font-brand mb-2"></h2>
                        <p id="detailDesc" class="text-gray-400 mb-6"></p>
                        <div id="downloadArea"></div>
                    </div>
                </div>

                <div class="mt-10 border-t border-white/10 pt-10">
                    <h3 class="font-brand text-3xl mb-6">RESEÑAS</h3>
                    
                    <div class="bg-[#0a0a0a] p-6 rounded-2xl border border-white/5 mb-10">
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Correo electrónico:</label>
                        <input type="email" id="revEmail" class="review-input" placeholder="tu@correo.com">
                        
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Usuario:</label>
                        <input type="text" id="revUser" class="review-input" placeholder="Nombre de usuario">
                        
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Reseña:</label>
                        <textarea id="revText" class="review-input h-24" placeholder="Escribe tu opinión aquí..."></textarea>
                        
                        <button onclick="saveReview()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-cyan-400 transition">PUBLICAR RESEÑA</button>
                    </div>

                    <div id="reviews-list" class="space-y-4"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const games = [
            { id: 'rdr', title: 'Red Dead Redemption', poster: 'https://upload.wikimedia.org/wikipedia/en/a/a7/Red_Dead_Redemption.jpg', link: 'https://dl.apkvision.org/...', desc: 'La épica historia del forajido John Marston.' },
            { id: 'pvzfusion', title: 'PvZ Fusion', poster: 'https://thepvzfusion.pro/wp-content/uploads/2026/02/images-12-1.webp', link: 'https://file.pvzfusionapk.mx/...', desc: 'Versión modificada con fusiones increíbles.' },
            { id: 'p5', title: 'Poppy Playtime 5', poster: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ6NCirZXspnRehiwpdhsRa4wQ_ecXusChoiDMJ2oVLablQGCWjCBLlfG1Z&s=10', link: '#', desc: 'El capítulo más aterrador hasta la fecha.' }
        ];

        let currentGameId = '';

        function render() {
            const val = document.getElementById('catalogSearch').value.toLowerCase();
            const grid = document.getElementById('gameGrid');
            const filtered = games.filter(g => g.title.toLowerCase().includes(val));
            
            grid.innerHTML = filtered.map(g => `
                <div class="game-card" onclick="openGame('${g.id}')">
                    <img src="${g.poster}" class="char-img">
                    <div class="game-title-badge"><span class="game-title-text">${g.title}</span></div>
                </div>
            `).join('');
        }

        function openGame(id) {
            const g = games.find(x => x.id === id);
            currentGameId = id;
            document.getElementById('detailImg').src = g.poster;
            document.getElementById('detailTitle').innerText = g.title;
            document.getElementById('detailDesc').innerText = g.desc;
            document.getElementById('downloadArea').innerHTML = `<a href="${g.link}" class="download-btn block text-center">DESCARGAR APK</a>`;
            
            loadReviews(id);
            navigate('detail');
        }

        function navigate(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            window.scrollTo(0,0);
        }

        // --- LÓGICA DE RESEÑAS LOCALES ---
        function saveReview() {
            const email = document.getElementById('revEmail').value;
            const user = document.getElementById('revUser').value;
            const text = document.getElementById('revText').value;

            if(!user || !text) { alert("Por favor completa Usuario y Reseña"); return; }

            const newReview = {
                user: user,
                email: email,
                text: text,
                date: new Date().toLocaleDateString()
            };

            let allReviews = JSON.parse(localStorage.getItem('ep_reviews_' + currentGameId)) || [];
            allReviews.unshift(newReview);
            localStorage.setItem('ep_reviews_' + currentGameId, JSON.stringify(allReviews));

            document.getElementById('revText').value = "";
            loadReviews(currentGameId);
        }

        function loadReviews(gameId) {
            const list = document.getElementById('reviews-list');
            const reviews = JSON.parse(localStorage.getItem('ep_reviews_' + gameId)) || [];
            
            if(reviews.length === 0) {
                list.innerHTML = `<p class="text-gray-600 text-center text-sm">No hay reseñas aún. ¡Sé el primero!</p>`;
                return;
            }

            list.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-cyan-400 font-bold text-xs uppercase">${r.user}</span>
                        <span class="text-[10px] text-gray-600">${r.date}</span>
                    </div>
                    <p class="text-sm text-gray-300">${r.text}</p>
                    <p class="text-[9px] text-gray-700 mt-2 italic">${r.email}</p>
                </div>
            `).join('');
        }

        // Inicializar
        render();
        AOS.init();
    </script>
</body>
</html>
