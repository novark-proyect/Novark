        function init() {
            const grid = document.getElementById('langGrid');
            grid.innerHTML = Object.keys(flags).map(code => `<button onclick="setLang('${code}')" class="lang-btn ${code === curLang ? 'selected' : ''}" id="flag-${code}">${flags[code]}</button>`).join('');
            
            // Inicializar el contador de juegos
            document.getElementById('game-total-count').innerText = games.length;
            
            AOS.init({ duration: 800, once: true });
        }

        function setLang(code) {
            curLang = code;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('selected'));
            const btn = document.getElementById(`flag-${code}`);
            if(btn) btn.classList.add('selected');
            
            applyTranslations();
            document.getElementById('language-overlay').style.display = 'none';
            render();
            setTimeout(() => { document.getElementById('mainBanner').classList.add('active-banner'); }, 300);
        }

        function applyTranslations() {
            const dict = i18n[curLang] || i18n['en'];
            document.getElementById('catalogSearch').placeholder = dict.search;
            document.getElementById('menu-back').innerText = "← " + dict.back;
            document.getElementById('nav-catalog').innerText = dict.catalog;
            document.getElementById('nav-request').innerText = dict.request;
            document.getElementById('req-view-title').innerText = dict.request;
            document.getElementById('requestInput').placeholder = dict.reqPlaceholder;
            document.getElementById('req-btn').innerText = dict.send;
            document.getElementById('detail-back').innerText = "← " + dict.back;
            document.getElementById('verified-label').innerText = dict.verified;
            document.getElementById('warn-title').innerText = dict.warnTitle;
            document.getElementById('warn-text').innerText = dict.warnText;
            document.getElementById('warn-cancel').innerText = dict.cancel;
            document.getElementById('counter-label').innerText = dict.availableGames;
            
            const currentDetailId = document.getElementById('detailTitle').dataset.gameId;
            if (currentDetailId) {
                const g = games.find(x => x.id === currentDetailId);
                updateGameDetails(g, dict);
            }
        }

        function render() {
            const s = document.getElementById('catalogSearch').value.toLowerCase();
            const grid = document.getElementById('gameGrid');
            const filt = games.filter(g => g.title.toLowerCase().includes(s));
            const dict = i18n[curLang] || i18n['en'];

            grid.innerHTML = filt.map((g, i) => `
                <div class="game-card" data-aos="fade-up" onclick="startLoading('${g.id}')">
                    <img src="${g.poster}" class="char-img">
                    <div class="game-title-badge">
                        <span class="verified-tag">${dict.verified}</span>
                        <span class="game-title-text">${g.title}</span>
                    </div>
                </div>
            `).join('');
        }

        function startLoading(gameId) {
            const loader = document.getElementById('loading-screen');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                if(gameId === 'home') showView('home');
                else if(gameId === 'request') showView('request');
                else openGame(gameId);
            }, 500);
        }

        function openGame(id) {
            const g = games.find(x => x.id === id);
            const dict = i18n[curLang] || i18n['en'];
            
            document.getElementById('detailTitle').dataset.gameId = id;
            updateGameDetails(g, dict);
            
            const btnContainer = document.getElementById('downloadContainer');
            
            if (g.hasWait) {
                btnContainer.innerHTML = `<button id="pre-download-btn" class="download-btn" disabled>${dict.wait} (5)</button>`;
                showView('detail');
                let count = 5;
                const preBtn = document.getElementById('pre-download-btn');
                const interval = setInterval(() => {
                    count--;
                    if(count > 0) {
                        preBtn.innerText = `${dict.wait} (${count})`;
                    } else {
                        clearInterval(interval);
                        preBtn.innerText = dict.download;
                        preBtn.disabled = false;
                        preBtn.onclick = () => {
                            if(g.hasWarning) showWarning(g.link);
                            else window.open(g.link, '_blank');
                        };
                    }
                }, 1000);
            } else {
                btnContainer.innerHTML = `<button id="pre-download-btn" class="download-btn">${dict.download}</button>`;
                document.getElementById('pre-download-btn').onclick = () => {
                    if(g.hasWarning) showWarning(g.link);
                    else window.open(g.link, '_blank');
                };
                showView('detail');
            }
        }

        function updateGameDetails(g, dict) {
            document.getElementById('detailImg').src = g.screen;
            document.getElementById('detailTitle').innerText = g.title;
            document.getElementById('detailDesc').innerText = g.desc[curLang] || g.desc['en'] || g.desc['es'];
            
            let reqsHTML = `
                <div class="req-box">
                    <div class="req-title uppercase tracking-[2px]">${dict.reqTitle}</div>
                    <span class="req-item">• ${dict.ram}${g.reqs[0]}</span>
                    <span class="req-item">• ${dict.proc}${g.reqs[1]}</span>
                    <span class="req-item">• ${dict.disk}${g.reqs[2]}</span>
                    <span class="req-item">• ${dict.os}${g.reqs[3]}</span>
                    ${g.reqs[4] ? `<span class="req-item">• ${dict.perf}${g.reqs[4]}</span>` : ''}
                    <p class="req-warning">${dict.reqWarning}</p>
                </div>`;
            document.getElementById('requirementsContainer').innerHTML = reqsHTML;
        }

        function showWarning(link) {
            pendingGameId = link;
            const modal = document.getElementById('warning-modal');
            const btn = document.getElementById('warn-confirm');
            const dict = i18n[curLang] || i18n['en'];
            
            modal.style.display = 'flex';
            btn.disabled = true;
            let count = 5;
            btn.innerText = `${dict.accept} (5)`;
            
            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    btn.innerText = `${dict.accept} (${count})`;
                } else {
                    clearInterval(timer);
                    btn.innerText = dict.accept;
                    btn.disabled = false;
                    btn.onclick = () => {
                        window.open(pendingGameId, '_blank');
                        closeWarning();
                    };
                }
            }, 1000);
        }

        function closeWarning() {
            document.getElementById('warning-modal').style.display = 'none';
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            window.scrollTo(0,0);
        }

        function navigate(viewName) {
            if(viewName === 'home') document.getElementById('detailTitle').dataset.gameId = "";
            startLoading(viewName);
        }

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-menu-overlay');
            menu.classList.toggle('open');
            overlay.style.display = menu.classList.contains('open') ? 'block' : 'none';
        }

        async function sendRequest() {
            const val = document.getElementById('requestInput').value;
            const btn = document.getElementById('req-btn');
            const dict = i18n[curLang] || i18n['en'];
            if(!val) return;
            btn.innerText = "WAIT...";
            btn.disabled = true;
            try {
                await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({content: `SOLICITUD: **${val}**`}) 
                });
                document.getElementById('requestInput').value = "";
                btn.innerText = "✓";
                setTimeout(() => { btn.innerText = dict.send; btn.disabled = false; }, 3000);
            } catch(e) { btn.innerText = "ERROR"; btn.disabled = false; }
        }

        init();
    </script>
</body>
</html>
