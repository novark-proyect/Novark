        window.init = () => {
            const savedLang = localStorage.getItem('ep_lang');
            if(savedLang) {
                curLang = savedLang;
                document.getElementById('language-overlay').style.display = 'none';
                applyTranslations();
                setTimeout(() => {
                    const banner = document.getElementById('mainBanner');
                    if(banner) banner.classList.add('active-banner');
                }, 500);
            }

            const grid = document.getElementById('langGrid');
            grid.innerHTML = Object.keys(flags).map(code => `
                <div onclick="setLang('${code}')" class="lang-card">
                    <span class="flag text-4xl transition-transform duration-300">${flags[code]}</span>
                    <span class="font-ui text-[10px] text-white/40 uppercase tracking-widest">${i18n[code].name}</span>
                </div>
            `).join('');

            render();
            AOS.init({ duration: 1000, once: true });
        };

        window.setLang = (code) => {
            curLang = code;
            if(document.getElementById('rememberLang').checked) {
                localStorage.setItem('ep_lang', code);
            }
            document.getElementById('language-overlay').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('language-overlay').style.display = 'none';
                applyTranslations();
                const banner = document.getElementById('mainBanner');
                if(banner) banner.classList.add('active-banner');
            }, 300);
        };

        window.resetLanguage = () => {

        function applyTranslations() {

            document.getElementById('catalogSearch').placeholder = t.search;
            document.getElementById('nav-catalog').innerText = t.catalog;
            document.getElementById('nav-request').innerText = t.request;
            document.getElementById('nav-changelang').innerText = t.changelang;
            document.getElementById('counter-label').innerText = t.available;
            document.getElementById('label-no-ask').innerText = t.noAsk;
            document.getElementById('label-verified-user').innerText = t.verifiedUser;
            document.getElementById('btn-back').innerHTML = `<span class="group-hover:-translate-x-2 transition-transform">←</span> <span class="group-hover:text-white transition-colors">${t.back}</span>`;
            document.getElementById('label-reviews-title').innerText = t.reviewsTitle;
            document.getElementById('msg-login-review').innerText = t.loginMsg;
            document.getElementById('btn-login-review-text').innerText = t.loginNow;
            document.getElementById('label-your-rating').innerText = t.yourRating;
            document.getElementById('review-text').placeholder = t.opinionPlh;
            document.getElementById('btn-submit-review').innerText = t.post;
            document.getElementById('verified-label').innerText = t.verifiedBy;
            document.getElementById('req-view-title').innerText = t.request;
            document.getElementById('requestInput').placeholder = t.placeholder;
            document.getElementById('req-btn').innerText = t.send;
            render();
        }

        window.login = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } catch (error) { console.error(error); }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const profile = document.getElementById('user-profile');
            const btnLogin = document.getElementById('btn-login');
            const reviewLogin = document.getElementById('login-to-review');
            const reviewForm = document.getElementById('active-review-form');

            if(user) {
                profile.classList.remove('hidden');
                btnLogin.classList.add('hidden');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName;
                reviewLogin.classList.add('hidden');
                reviewForm.classList.remove('hidden');
            } else {
                profile.classList.add('hidden');
                btnLogin.classList.remove('hidden');
                reviewLogin.classList.remove('hidden');
                reviewForm.classList.add('hidden');
            }
        });

        document.querySelectorAll('#star-input .star').forEach(star => {
            star.onclick = (e) => {
                const val = parseInt(e.target.dataset.value);
                selectedRating = val;
                updateStars(val);
            };
        });

        function updateStars(val) {
            document.querySelectorAll('#star-input .star').forEach(s => {
                s.classList.toggle('active', parseInt(s.dataset.value) <= val);
            });
        }

        window.submitReview = async () => {
            const text = document.getElementById('review-text').value;
            if(selectedRating === 0 || !text.trim() || !currentUser) return;
            const btn = document.getElementById('btn-submit-review');
            btn.disabled = true;
            btn.innerText = "...";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `reviews_${currentGameId}`), {
                    uid: currentUser.uid,
                    name: currentUser.displayName,
                    photo: currentUser.photoURL,
                    rating: selectedRating,
                    text: text,
                    createdAt: serverTimestamp()
                });
                document.getElementById('review-text').value = "";
                selectedRating = 0;
                updateStars(0);
                btn.disabled = false;
                applyTranslations();
            } catch (e) { btn.innerText = "ERR"; }
        };

        window.loadReviews = (gameId) => {
            const list = document.getElementById('reviews-list');
            const t = i18n[curLang] || i18n.en;
            list.innerHTML = `<p class="text-gray-600 text-xs text-center animate-pulse">${t.loadingCom || '...'}</p>`;
            const q = collection(db, 'artifacts', appId, 'public', 'data', `reviews_${gameId}`);
            onSnapshot(q, (snapshot) => {
                const reviews = snapshot.docs.map(doc => doc.data()).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                if(reviews.length === 0) {
                    list.innerHTML = `<p class="text-gray-600 text-xs text-center py-10 opacity-50">${t.beFirst || '...'}</p>`;
                    return;
                }
                list.innerHTML = reviews.map((r, i) => `
                    <div class="review-card">
                        <div class="flex items-center gap-3 mb-3">
                            <img src="${r.photo}" class="w-8 h-8 rounded-full border border-white/10">
                            <div class="flex flex-col">
                                <span class="text-xs font-bold text-white">${r.name}</span>
                                <div class="flex gap-0.5">${'★'.repeat(r.rating).split('').map(() => `<span class="text-cyan-400 text-[10px]">★</span>`).join('')}</div>
                            </div>
                        </div>
                        <p class="text-gray-400 text-sm leading-relaxed">${r.text}</p>
                    </div>
                `).join('');
            });
        };

        window.render = () => {
            const val = document.getElementById('catalogSearch').value.toLowerCase();
            const grid = document.getElementById('gameGrid');
            const sortedGames = [...games].sort((a, b) => {
                if (a.showNewBadge && !b.showNewBadge) return -1;
                if (!a.showNewBadge && b.showNewBadge) return 1;
                return 0;
            });
            const filtered = sortedGames.filter(g => g.title.toLowerCase().includes(val));
            const t = i18n[curLang] || i18n.en;
            document.getElementById('game-total-count').innerText = filtered.length;
            grid.innerHTML = filtered.map((g, i) => `
                <div class="game-card" data-aos="fade-up" data-aos-delay="${(i % 5) * 100}" onclick="openGame('${g.id}')">
                    ${g.showNewBadge ? `<div class="portada-updated-badge">${t.new || 'NEW'}</div>` : ''}
                    <img src="${g.poster}" class="char-img">
                    <div class="game-title-badge"><span class="game-title-text">${g.title}</span></div>
                </div>
            `).join('');
        };

        window.openGame = (id) => {
            const g = games.find(x => x.id === id);
            if(!g) return;
            currentGameId = id;
            const t = i18n[curLang] || i18n.en;
            document.getElementById('detailImg').src = g.screen;
            document.getElementById('detailTitle').innerText = g.title;
            document.getElementById('detailDesc').innerText = g.desc[curLang] || g.desc.en || g.desc.es;
            document.getElementById('reqsContainer').innerHTML = `
                <div class="p-6 bg-[#0a0a0a] border-l-4 border-cyan-400 rounded-r-3xl">
                    <p class="text-xs text-cyan-400 font-bold mb-4 uppercase tracking-widest">${t.reqsTitle || 'REQUIREMENTS'}</p>
                    <div class="grid grid-cols-2 gap-4 text-xs text-gray-400 font-ui">
                        <span>RAM: ${g.reqs[0]}</span>
                        <span>CPU: ${g.reqs[1]}</span>
                        <span>DISK: ${g.reqs[2]}</span>
                        <span>ANDR: ${g.reqs[3]}</span>
                    </div>
                </div>
            `;
            document.getElementById('downloadArea').innerHTML = `<button onclick="handleDownload('${g.id}', '${g.link}')" class="download-btn"><span>${t.download || 'DOWNLOAD'}</span></button>`;
            showView('detail');
            loadReviews(id);
        };

        window.handleDownload = async (id, link) => {
            const g = games.find(x => x.id === id);
            if(!g) return;
            window.open(link, '_blank');
            try {
                const userData = currentUser ? { name: currentUser.displayName, email: currentUser.email } : { name: 'Usuario Anónimo', email: 'No logueado' };
                const embed = {
                    title: "🚀 Nueva Descarga",
                    color: 62207,
                    thumbnail: { url: g.poster },
                    fields: [
                        { name: "🎮 Juego", value: g.title, inline: true },
                        { name: "👤 Usuario", value: userData.name, inline: true }
                    ],
                    footer: { text: "EP Team Official Logger" },
                    timestamp: new Date().toISOString()
                };
                await fetch(DISCORD_WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ embeds: [embed] }) });
            } catch (err) {}
        };

        window.showView = (v) => {
            const sections = document.querySelectorAll('.view-section');
            sections.forEach(s => { s.style.opacity = '0'; s.style.transform = 'translateY(15px)'; });
            setTimeout(() => {
                sections.forEach(s => s.classList.remove('active'));
                const active = document.getElementById(v + '-view');
                active.classList.add('active');
                setTimeout(() => { active.style.opacity = '1'; active.style.transform = 'translateY(0)'; }, 50);
                window.scrollTo(0,0);
            }, 300);
        };

        window.navigate = (v) => {
            document.getElementById('loading-screen').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                if(v === 'home') currentGameId = null;
                showView(v);

        };

        window.toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');

            const isOpen = menu.style.right === '0px';
            if(isOpen) {
                menu.style.right = '-100%';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.style.opacity = '1'; menu.style.right = '0'; }, 10);
            }
        };

        window.sendRequest = async () => {
            const val = document.getElementById('requestInput').value;
            if(!val) return;
            const btn = document.getElementById('req-btn');
            btn.innerText = "...";

                const embed = {
                    title: "📝 Nueva Petición",

                    footer: { text: "EP Team Request System" },
                    timestamp: new Date().toISOString()

                btn.innerText = "¡ENVIADO!";
                setTimeout(() => { applyTranslations(); }, 2000);
            } catch(e) { btn.innerText = "ERR"; }
        };

        init();
    </script>
