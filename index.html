        function init() {
            const grid = document.getElementById('langGrid');
            grid.innerHTML = Object.keys(languages).map(code => `
                <div class="lang-btn" onclick="setLanguage('${code}')">
                    <span class="text-3xl">${languages[code].flag}</span>
                    <span class="text-[10px] font-black uppercase">${languages[code].name}</span>
                </div>
            `).join('');
        }

        function setLanguage(code) {
            currentLangCode = code;
            document.getElementById('language-overlay').style.display = 'none';
            const t = languages[code];
            document.getElementById('home-title').innerHTML = t.home;
            document.getElementById('req-title').innerText = t.req;
            document.getElementById('nav-home').innerText = t.navHome;
            document.getElementById('nav-request').innerText = t.navReq;
            document.getElementById('nav-lang').innerText = t.navLang;
            document.getElementById('req-btn').innerText = t.reqBtn;
            document.getElementById('back-btn').innerText = t.back;
            document.getElementById('close-menu').innerText = t.close;
            document.getElementById('loading-text').innerText = t.loading;
            document.getElementById('catalogSearch').placeholder = t.search;
            document.getElementById('warn-title').innerText = t.warnTitle;
            document.getElementById('warn-btn').innerText = t.warnBtn;

            if(currentGameId) openGame(currentGameId);
            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('gameGrid');
            const search = document.getElementById('catalogSearch').value.toLowerCase();
            const filtered = games.filter(g => g.title.toLowerCase().includes(search));
            grid.innerHTML = filtered.map(g => `
                <div class="game-card" onclick="openGame('${g.id}')">
                    <img src="${g.poster}" class="char-img" onerror="this.src='https://placehold.co/400x600/111/fff?text=No+Image'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6"><h3 class="text-2xl font-black font-brand">${g.title}</h3></div>
                </div>
            `).join('');
        }

        function openGame(id) {
            currentGameId = id;
            const g = games.find(x => x.id === id);
            pendingUrl = g.link;
            pendingName = g.title;
            const t = languages[currentLangCode];
            
            document.getElementById('detailImg').src = g.screen;
            document.getElementById('detailTitle').innerText = g.title;
            
            let descHtml = "";
            if (g.id === 'p5') {
                descHtml += `<ul class="list-disc list-inside mb-4 text-sm text-white/70 space-y-1">`;
                t.p5Features.forEach(feat => {
                    descHtml += `<li>${feat}</li>`;
                });
                descHtml += `</ul>`;
                descHtml += `<p class="mt-4">${t.gameDescs.p5}</p>`;
            } else {
                const desc = t.gameDescs[g.id] || g.title + " Full Version";
                descHtml += `<p class="mt-4">${desc}</p>`;
            }
            
            if (g.updated) {
                descHtml += `<p class="mt-4 text-[#00f2ff] font-bold uppercase text-xs tracking-widest">${t.updated}</p>`;
            }

            document.getElementById('detailDesc').innerHTML = descHtml;
            
            let extra = '';
            if (g.credits) {
                extra = `<p class="text-xs font-bold text-white/40 uppercase tracking-widest mt-4">${t.credits}: ${g.credits}</p>`;
            }
            if (g.id === 'p5') {
                extra += `<p class="text-lg font-black text-[#00f2ff] uppercase italic font-brand mt-4">⚠️ ${t.warnDesc}</p>`;
            }

            document.getElementById('downloadContainer').innerHTML = `
                <button onclick="handleDownload()" class="btn-action shadow-[0_0_20px_rgba(0,242,255,0.4)]">${t.dlNow}</button>
                ${extra}
            `;
            showView('detail');
        }

        async function sendToDiscord(title, isRequest = false) {
            const langName = languages[currentLangCode].name;
            
            // Usamos saltos de línea dobles \n\n para separar bien los bloques de texto
            const textMessage = `**${title}**\n\nProcesando APK.\n\n**Idioma:** ${langName}\n\n✅ **DESCARGA SOLICITADA**`;
            const reqMessage = `**${title}**\n\nProcesando APK.\n\n**Idioma:** ${langName}\n\n❓ **PETICIÓN RECIBIDA**`;

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: isRequest ? reqMessage : textMessage })
            });
        }

        function handleDownload() {
            if (currentGameId === 'p5') {
                document.getElementById('warn-desc').innerText = languages[currentLangCode].warnDesc;
                document.getElementById('warning-modal').style.display = 'flex';
            } else { confirmDownload(); }
        }

        function confirmDownload() {
            document.getElementById('warning-modal').style.display = 'none';
            document.getElementById('loading-text').innerText = languages[currentLangCode].downloading;
            document.getElementById('loading-screen').style.display = 'flex';
            
            sendToDiscord(pendingName);

            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                window.open(pendingUrl, '_blank');
                document.getElementById('loading-text').innerText = languages[currentLangCode].loading;
            }, 2000);
        }

        function sendRequest() {
            const val = document.getElementById('requestInput').value;
            if(!val.trim()) return;
            
            sendToDiscord(val, true);

            document.getElementById('requestInput').value = "";
            const successMsg = currentLangCode === 'es' ? "¡Petición enviada!" : "Request sent!";
            alert(successMsg);
        }

        function filterGames() { renderCatalog(); }
        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }
        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            window.scrollTo(0,0);
        }
        window.onload = init;
    </script>
</body>
</html>
