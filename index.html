        window.init = () => {
            const savedLang = localStorage.getItem('ep_lang');
            if(savedLang) {
                curLang = savedLang;
                document.getElementById('language-overlay').style.display = 'none';
                applyTranslations();
                document.getElementById('mainBanner')?.classList.add('active-banner');
            }

            const grid = document.getElementById('langGrid');
            grid.innerHTML = Object.keys(i18n).map(code => `
                <div onclick="setLang('${code}')" class="lang-card">
                    <span class="text-4xl filter drop-shadow-md group-hover:scale-110 transition-transform">${flags[code] || '🌐'}</span>
                    <span class="font-ui text-[10px] text-white/40 uppercase font-bold tracking-[2px]">${i18n[code]?.name || code}</span>
                </div>
            `).join('');

            window.addEventListener('scroll', () => {
                const header = document.getElementById('main-header');
                header.classList.toggle('scrolled', window.scrollY > 50);
            });

            render();
            
            AOS.init({ 
                duration: 1000, 
                once: false,
                easing: 'ease-out-cubic'
            });
        };

        window.setLang = (code) => {
            curLang = code;
            if(document.getElementById('rememberLang').checked) localStorage.setItem('ep_lang', code);
            applyTranslations(); 
            document.getElementById('language-overlay').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('language-overlay').style.display = 'none';
                const banner = document.getElementById('mainBanner');
                if (banner) banner.classList.add('active-banner');
            }, 300);
        };

        window.resetLanguage = () => {
            localStorage.removeItem('ep_lang');
            document.getElementById('language-overlay').style.display = 'flex';
            document.getElementById('language-overlay').classList.remove('opacity-0');
            toggleMenu();
        };

        function applyTranslations() {
            const t = i18n[curLang] || i18n.en;
            document.getElementById('catalogSearch').placeholder = t.search;
            document.getElementById('catalogSearchMobile').placeholder = t.search;
            document.getElementById('nav-catalog').innerText = t.catalog;
            document.getElementById('nav-request').innerText = t.request;
            document.getElementById('nav-changelang').innerText = t.changelang;
            document.getElementById('counter-label').innerText = t.available;
            document.getElementById('label-no-ask').innerText = t.noAsk;
            document.getElementById('btn-back').querySelector('span:last-child').innerText = t.back;
            document.getElementById('verified-label').innerText = t.verifiedBy;
            document.getElementById('req-view-title').innerText = t.request;
            document.getElementById('requestInput').placeholder = t.placeholder;
            document.getElementById('req-btn').innerText = t.send;
            render();
        }

        window.syncAndRender = (input) => {
            document.getElementById('catalogSearch').value = input.value;
            render();
        };

        window.render = () => {
            const val = document.getElementById('catalogSearch').value.toLowerCase();
            const grid = document.getElementById('gameGrid');
            const filtered = games.filter(g => g.title.toLowerCase().includes(val));
            document.getElementById('game-total-count').innerText = filtered.length;
            
            grid.innerHTML = filtered.map((g, i) => `
                <div class="game-card" data-aos="fade-up" data-aos-delay="${(i % 5) * 50}" onclick="openGame('${g.id}')">
                    ${g.showNewBadge ? `<div class="portada-updated-badge">${i18n[curLang]?.new || 'NEW'}</div>` : ''}
                    <img src="${g.poster}" class="char-img">
                    <div class="game-title-badge"><span class="game-title-text uppercase">${g.title}</span></div>
                </div>
            `).join('');
        };

        window.openGame = (id) => {
            scrollPos = window.scrollY;
            const g = games.find(x => x.id === id); if(!g) return;
            currentGameId = id;
            
            document.getElementById('reportTerminal').classList.add('hidden');
            document.getElementById('reportMessage').value = "";

            const detailImg = document.getElementById('detailImg');
            detailImg.style.opacity = '0';
            detailImg.src = g.screen;
            detailImg.onload = () => {
                detailImg.style.opacity = '1';
                detailImg.style.transition = 'opacity 0.3s ease';
            };

            document.getElementById('detailTitle').innerText = g.title;
            document.getElementById('detailDesc').innerText = g.desc[curLang] || g.desc.en;
            
            document.getElementById('reqsContainer').innerHTML = `
                <div class="p-8 bg-white/[0.03] border-l-4 border-cyan-400 rounded-r-[2rem] backdrop-blur-md">
                    <p class="text-[10px] text-cyan-400 font-bold mb-6 uppercase tracking-[3px]">${i18n[curLang]?.reqsTitle || 'SYSTEM REQUIREMENTS'}</p>
                    <div class="grid grid-cols-2 gap-y-6 gap-x-4 text-xs text-gray-300 font-ui font-bold uppercase">
                        <div class="flex flex-col gap-1"><span class="text-[9px] text-gray-600">Memory</span> <span>RAM: ${g.reqs[0]}</span></div>
                        <div class="flex flex-col gap-1"><span class="text-[9px] text-gray-600">Processor</span> <span>CPU: ${g.reqs[1]}</span></div>
                        <div class="flex flex-col gap-1"><span class="text-[9px] text-gray-600">Storage</span> <span>DISK: ${g.reqs[2]}</span></div>
                        <div class="flex flex-col gap-1"><span class="text-[9px] text-gray-600">Version</span> <span>ANDR: ${g.reqs[3]}</span></div>
                    </div>
                </div>`;

            document.getElementById('downloadArea').innerHTML = `
                <button onclick="handleDownload('${g.id}', '${g.link}')" class="download-btn group">
                    <span class="flex items-center justify-center gap-3">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21l-8-9h6V3h4v9h6l-8 9z"/></svg>
                        ${i18n[curLang]?.download || 'DOWNLOAD'}
                    </span>
                </button>`;
            
            showView('detail'); 
            window.scrollTo({ top: 0, behavior: 'auto' });
        };

        window.handleDownload = async (id, link) => {
            const g = games.find(x => x.id === id); window.open(link, '_blank');
            try {
                await fetch(WEBHOOK_DOWNLOADS, { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ 
                        embeds: [{ 
                            title: "🚀 Descarga Iniciada", 
                            color: 62207, 
                            thumbnail: { url: g.poster },
                            fields: [
                                {name:"🎮 Juego", value: g.title, inline: true}, 
                                {name:"🌐 Idioma", value: curLang, inline: true}
                            ] 
                        }] 
                    }) 
                });
            } catch (err) {}
        };

        window.toggleReportTerminal = () => {
            document.getElementById('reportTerminal').classList.toggle('hidden');
        };

        window.showReportTerminalFromMenu = () => {
            currentGameId = "ERROR_PAGINA_WEB";
            const detailImg = document.getElementById('detailImg');
            detailImg.src = "https://i.ibb.co/G4Z5gvHw/icon.png";
            document.getElementById('detailTitle').innerText = "REPORTAR ERROR DE PÁGINA";
            document.getElementById('detailDesc').innerText = "Utiliza el terminal de abajo para informar sobre un fallo general en la interfaz o funcionamiento del sitio.";
            document.getElementById('reqsContainer').innerHTML = "";
            document.getElementById('downloadArea').innerHTML = "";
            
            showView('detail');
            document.getElementById('reportTerminal').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.sendReport = async () => {
            const isPageError = currentGameId === "ERROR_PAGINA_WEB";
            const g = isPageError ? { title: "Error General de Página", poster: "https://i.ibb.co/G4Z5gvHw/icon.png" } : games.find(x => x.id === currentGameId);
            const msg = document.getElementById('reportMessage').value;
            if(!msg) return;

            try {
                await fetch(WEBHOOK_REPORTS, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: isPageError ? "🔧 REPORTE DE PÁGINA" : "⚠️ REPORTE DE JUEGO",
                            color: 16711680,
                            thumbnail: { url: g.poster },
                            fields: [
                                { name: "🎮 Contexto", value: g.title, inline: true },
                                { name: "📝 Comentario", value: msg }
                            ]
                        }]
                    })
                });
                document.getElementById('reportMessage').value = "";
                document.getElementById('reportTerminal').innerHTML = "<p class='text-red-500 font-bold text-center'>REPORTE ENVIADO</p>";
                setTimeout(() => toggleReportTerminal(), 2000);
            } catch(e) {}
        };

        window.showView = (v) => {
            document.querySelectorAll('.view-section').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            const active = document.getElementById(v + '-view'); 
            active.style.display = 'block';
            setTimeout(() => active.classList.add('active'), 10);
        };

        window.navigate = (v) => { 
            showView(v === 'home' ? 'home' : v); 
            if(v === 'home') {
                setTimeout(() => { window.scrollTo({ top: scrollPos, behavior: 'auto' }); }, 10);
            } else {
                window.scrollTo({ top: 0, behavior: 'auto' });
            }
        };

        window.toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-menu-overlay');
            const isOpen = menu.style.right === '0px';
            menu.style.right = isOpen ? '-100%' : '0px';
            overlay.classList.toggle('hidden', isOpen);
            setTimeout(() => overlay.style.opacity = isOpen ? '0' : '1', 10);
        };

        window.sendRequest = async () => {
            const val = document.getElementById('requestInput').value; if(!val) return;
            const btn = document.getElementById('req-btn'); 
            const originalText = btn.innerText;
            btn.innerText = "...";
            try {
                await fetch(WEBHOOK_REQUESTS, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ embeds: [{ title: "📝 Nueva Petición de Juego", color: 0x00f2ff, fields: [{ name: "🕹️ Título", value: val }, {name: "🌍 Idioma", value: curLang}] }] }) });
                document.getElementById('requestInput').value = ""; 
                btn.innerText = "RECEIVED";
                btn.style.background = "#fff";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "var(--cyan)";
                }, 3000);
            } catch(e) { btn.innerText = "ERROR"; }
        };

        window.onload = init;
    </script>
</body>
</html>
